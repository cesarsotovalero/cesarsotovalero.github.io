{% assign videos = site.data.youtube-videos %}
{% if videos.size > 0 %}
<section class="index-section">
   <h2 class="index-section-title">Latest YouTube Videos</h2>
   <div class="linkedin-posts-container post-preview index-cards">
      {% for video in videos limit:3 %}
      <a href="https://www.youtube.com/watch?v={{ video.id }}" target="_blank" class="youtube-video-link">
         <div class="youtube-video-card">
            <div class="youtube-video-text">
               <h3 class="youtube-video-title">{{ video.snippet.title }}</h3>
               <p class="youtube-video-description">
                  Published on {{ video.snippet.publishedAt | date: "%b %-d, %Y" }}
               </p>
            </div>
            <div class="youtube-video-thumbnail">
               <img src="{{ video.snippet.thumbnails.medium.url }}" alt="{{ video.snippet.title }}" loading="lazy">
            </div>
         </div>
      </a>
      {% endfor %}
   </div>
   <p class="index-see-all"><a href="/youtube" class="list-filter">See all videos &rarr;</a></p>
</section>
{% endif %}
