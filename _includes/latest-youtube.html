{% assign videos = site.data.youtube-videos %}
{% if videos.size > 0 %}
<section class="index-section">
   <h2 class="index-section-title">Latest YouTube Videos</h2>
   <ul class="index-list">
      {% for video in videos limit:3 %}
      <li class="index-list-item">
         <div class="index-list-info">
            <a href="https://www.youtube.com/watch?v={{ video.id }}" target="_blank" rel="noopener noreferrer">{{ video.snippet.title }}</a>
            <span class="index-list-meta">{{ video.snippet.publishedAt | date: "%B %-d, %Y" }}</span>
         </div>
         <a href="https://www.youtube.com/watch?v={{ video.id }}" target="_blank" rel="noopener noreferrer" class="index-list-thumb">
            <img src="{{ video.snippet.thumbnails.medium.url }}" alt="{{ video.snippet.title }}" loading="lazy">
         </a>
      </li>
      {% endfor %}
   </ul>
   <p class="index-see-all"><a href="/youtube" class="list-filter">See all videos &rarr;</a></p>
</section>
{% endif %}
